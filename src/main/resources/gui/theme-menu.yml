# =========================================================
# DreamKillEcho 击杀播报主题仓库 GUI
# 写法：Title + GuiPlain + GuiKey + templates
# @ 是自动分页内容位，会按 themes.yml 的主题列表自动填充。
# 新增主题时只需要修改 themes.yml 与权限，不需要同步修改本文件槽位。
# =========================================================

Title: "&#38BDF8&l✦ &#7DD3FC&l击杀播报主题 &#94A3B8| &#E2E8F0进度: &#A7F3D0%unlocked%&#94A3B8/&#E2E8F0%total%"

GuiPlain:
  - "X#######X"
  - "#@@@@@@@#"
  - "#@@@@@@@#"
  - "#@@@@@@@#"
  - "#@@@@@@@#"
  - "L###B###N"

GuiKey:
  "@":
    IconFunction: "item"

  "#":
    Material: "BLACK_STAINED_GLASS_PANE"
    Name: "&f"

  "X":
    Material: "CYAN_STAINED_GLASS_PANE"
    Name: "&f"

  "B":
    IconFunction: "back"
    Material: "BARRIER"
    Name: "&#F87171&l[✕] &c关闭仓库"
    Lore:
      - ""
      - "&#94A3B8▪ &#E2E8F0当前使用: &#FDE047%current_theme%"
      - ""
      - "&#F87171➜ 点击关闭菜单"

  "L":
    IconFunction: "last"
    has:
      Material: "ARROW"
      Name: "&#FDE047&l[◀] &e上一页"
      Lore:
        - ""
        - "&#94A3B8▪ &#E2E8F0当前页: &#38BDF8%page% &#94A3B8/ &#38BDF8%pages%"
        - ""
        - "&#FDE047➜ 点击返回上一页"
    normal:
      Material: "GRAY_STAINED_GLASS_PANE"
      Name: "&#94A3B8&l[◀] &7已经是第一页"

  "N":
    IconFunction: "next"
    has:
      Material: "ARROW"
      Name: "&#FDE047&l[▶] &e下一页"
      Lore:
        - ""
        - "&#94A3B8▪ &#E2E8F0当前页: &#38BDF8%page% &#94A3B8/ &#38BDF8%pages%"
        - ""
        - "&#FDE047➜ 点击前往下一页"
    normal:
      Material: "GRAY_STAINED_GLASS_PANE"
      Name: "&#94A3B8&l[▶] &7已经是最后一页"

CloseOnSelect: true

Status:
  Selected: "&#FDE047&l[当前使用]"
  Available: "&#A7F3D0&l[已解锁]"
  Locked: "&#F87171&l[未解锁]"

templates:
  theme-available:
    material: "NAME_TAG"
    name: "&#A7F3D0&l%theme_display%"
    lore:
      - "&#475569&m                               "
      - "&#94A3B8▪ &#E2E8F0主题 ID: &#A7F3D0%theme_id%"
      - "&#94A3B8▪ &#E2E8F0解锁权限: &#A7F3D0%theme_permission%"
      - "&#94A3B8▪ &#E2E8F0优先等级: &#FDE047%theme_priority%"
      - "&#94A3B8▪ &#E2E8F0当前状态: %theme_status%"
      - ""
      - "&#38BDF8播报示例:"
      - "%theme_preview%"
      - "&#475569&m                               "
      - "&#A7F3D0➜ 左键点击装备此主题"

  theme-selected:
    material: "NETHER_STAR"
    name: "&#FDE047&l%theme_display%"
    lore:
      - "&#475569&m                               "
      - "&#94A3B8▪ &#E2E8F0主题 ID: &#FDE047%theme_id%"
      - "&#94A3B8▪ &#E2E8F0解锁权限: &#FDE047%theme_permission%"
