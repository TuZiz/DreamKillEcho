# DreamKillEcho 简体中文语言文件
# 支持 MiniMessage。<prefix> 会自动替换为下方 prefix。
prefix: "<gradient:#8ec5ff:#e0c3fc>[DreamKillEcho]</gradient>"
no-permission: "<prefix> <red>你没有权限执行该操作。</red>"
reload-success: "<prefix> <green>配置已热重载。</green>"
reload-failed: "<prefix> <red>重载失败，已保留旧配置。原因：<reason></red>"
player-only: "<prefix> <red>该命令只能由玩家执行。</red>"
plugin-not-ready: "<prefix> <yellow>插件仍在加载，请稍后再试。</yellow>"
help:
  - "<prefix> <gray>/dke toggle</gray>"
  - "<prefix> <gray>/dke theme list|set|preview</gray>"
  - "<prefix> <gray>/dke custom set|preview|reset|status</gray>"
  - "<prefix> <gray>/dke stats <player> | top kills|streak</gray>"
theme-list-header: "<prefix> <aqua>可用主题：</aqua>"
theme-list-entry: "<gray>- <white><theme></white> <gray>(<display>) <status></gray>"
theme-owned: "<green>可用</green>"
theme-locked: "<red>未解锁</red>"
theme-set-success: "<prefix> <green>已切换主题：<theme></green>"
theme-no-permission: "<prefix> <red>你没有解锁该主题。</red>"
theme-not-found: "<prefix> <red>主题不存在。</red>"
theme-preview: "<prefix> <gray>主题预览：</gray> <message>"
custom-set-pending: "<prefix> <yellow>自定义击杀语已提交审核。</yellow>"
custom-set-success: "<prefix> <green>自定义击杀语已保存。</green>"
custom-preview: "<prefix> <gray>预览：</gray> <message>"
custom-reset: "<prefix> <green>自定义击杀语已重置。</green>"
custom-denied: "<prefix> <red>你的自定义击杀语未通过审核。</red>"
custom-status: "<prefix> <gray>自定义击杀语状态：<status></gray>"
review-empty: "<prefix> <green>当前没有待审核内容。</green>"
review-header: "<prefix> <aqua>待审核自定义击杀语：</aqua>"
review-entry: "<gray>- <white><player></white>: <message></gray>"
approve-success: "<prefix> <green>已通过 <player> 的自定义击杀语。</green>"
deny-success: "<prefix> <green>已拒绝 <player> 的自定义击杀语。</green>"
toggle-on: "<prefix> <green>已开启接收击杀播报。</green>"
toggle-off: "<prefix> <yellow>已关闭接收击杀播报。</yellow>"
stats-format: "<prefix> <white><player></white> <gray>击杀 <kills> / 死亡 <deaths> / 当前连杀 <streak> / 最高连杀 <max_streak></gray>"
top-format: "<prefix> <gray>#<rank> <white><player></white> <value></gray>"
resetstats-success: "<prefix> <green>已重置 <player> 的统计。</green>"
error-database: "<prefix> <red>数据库暂不可用，插件正在降级运行。</red>"
error-invalid-theme: "<prefix> <red>主题配置无效。</red>"
error-cooldown: "<prefix> <red>操作过快，请稍后再试。</red>"
error-message-too-long: "<prefix> <red>消息过长，最多 <max> 个字符。</red>"
error-blocked-word: "<prefix> <red>消息包含不允许的内容。</red>"
error-invalid-tag: "<prefix> <red>消息包含不允许使用的 MiniMessage 标签。</red>"
error-player-not-found: "<prefix> <red>找不到该玩家数据。</red>"
unknown-player: "未知玩家"
unknown-weapon: "未知武器"
bare-hand: "徒手"
death-cause-unknown: "未知"
