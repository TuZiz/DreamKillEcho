# DreamKillEcho 简体中文语言文件
# 支持 MiniMessage。<prefix> 会自动替换为下方 prefix。
prefix: "<gradient:#8ec5ff:#e0c3fc><b>DreamKillEcho</b></gradient> <dark_gray>»</dark_gray>"
no-permission: "<prefix> <#ff6b6b>✖ 你没有权限执行该操作。</#ff6b6b>"
reload-success: "<prefix> <#a8e6cf>✔ 插件配置已成功热重载。</#a8e6cf>"
reload-failed: "<prefix> <#ff6b6b>✖ 重载失败，已保留旧配置。</#ff6b6b> <dark_gray>|</dark_gray> <gray>原因: <reason></gray>"
player-only: "<prefix> <#ff6b6b>✖ 该命令只能由玩家在游戏内执行。</#ff6b6b>"
plugin-not-ready: "<prefix> <#ffd966>⏳ 插件仍在加载初始化，请稍后再试。</#ffd966>"

help:
  - ""
  - "<prefix> <#e0c3fc><b>命令帮助指南</b></#e0c3fc>"
  - "  <dark_gray>▪</dark_gray> <#8ec5ff>/dke toggle</#8ec5ff> <dark_gray>»</dark_gray> <gray>开启或关闭接收击杀播报</gray>"
  - "  <dark_gray>▪</dark_gray> <#8ec5ff>/dke theme list|set|preview</#8ec5ff> <dark_gray>»</dark_gray> <gray>管理和更换播报主题</gray>"
  - "  <dark_gray>▪</dark_gray> <#8ec5ff>/dke custom set|preview|reset|status</#8ec5ff> <dark_gray>»</dark_gray> <gray>设置你的专属击杀语</gray>"
  - "  <dark_gray>▪</dark_gray> <#8ec5ff>/dke stats <player> | top kills|streak</#8ec5ff> <dark_gray>»</dark_gray> <gray>查看击杀榜单与统计数据</gray>"
  - ""

theme-list-header: "<prefix> <#e0c3fc><b>可用主题列表：</b></#e0c3fc>"
theme-list-entry: "  <dark_gray>▪</dark_gray> <white><theme></white> <gray>(<display>)</gray> <status>"
theme-owned: "<#a8e6cf>[✔ 可用]</#a8e6cf>"
theme-locked: "<#ff6b6b>[✖ 未解锁]</#ff6b6b>"
theme-set-success: "<prefix> <#a8e6cf>✔ 已成功切换至主题: </#a8e6cf><white><theme></white>"
theme-no-permission: "<prefix> <#ff6b6b>✖ 你尚未解锁该主题，无法使用。</#ff6b6b>"
theme-not-found: "<prefix> <#ff6b6b>✖ 找不到指定的主题，请检查名称。</#ff6b6b>"
theme-preview: "<prefix> <#e0c3fc>✦ 主题预览:</#e0c3fc> <white><message></white>"

custom-set-pending: "<prefix> <#ffd966>⏳ 自定义击杀语已提交，请等待管理员审核。</#ffd966>"
custom-set-success: "<prefix> <#a8e6cf>✔ 自定义击杀语已成功保存生效。</#a8e6cf>"
custom-preview: "<prefix> <#e0c3fc>✦ 效果预览:</#e0c3fc> <white><message></white>"
custom-reset: "<prefix> <#a8e6cf>✔ 你的自定义击杀语已重置为默认设置。</#a8e6cf>"
custom-denied: "<prefix> <#ff6b6b>✖ 你的自定义击杀语未能通过审核。</#ff6b6b>"
custom-status: "<prefix> <gray>当前自定义击杀语状态: <status></gray>"

review-empty: "<prefix> <#a8e6cf>✔ 当前没有任何待审核的内容。</#a8e6cf>"
review-header: "<prefix> <#e0c3fc><b>待审核自定义击杀语：</b></#e0c3fc>"
review-entry: "  <dark_gray>▪</dark_gray> <#8ec5ff><player></#8ec5ff> <dark_gray>»</dark_gray> <white><message></white>"
approve-success: "<prefix> <#a8e6cf>✔ 已批准 <player> 的自定义击杀语。</#a8e6cf>"
deny-success: "<prefix> <#ff6b6b>✖ 已拒绝 <player> 的自定义击杀语。</#ff6b6b>"

toggle-on: "<prefix> <#a8e6cf>✔ 已开启接收全局击杀播报。</#a8e6cf>"
toggle-off: "<prefix> <#ffd966>⚠ 已关闭接收全局击杀播报。</#ffd966>"

stats-format: "<prefix> <#8ec5ff><b><player></b></#8ec5ff> <dark_gray>| </dark_gray><gray>击杀: <#a8e6cf><kills></#a8e6cf> <dark_gray>| </dark_gray>死亡: <#ff6b6b><deaths></#ff6b6b> <dark_gray>| </dark_gray>连杀: <#ffd966><streak></#ffd966> <dark_gray>| </dark_gray>最高连杀: <#e0c3fc><max_streak></#e0c3fc>"
top-format: "<prefix> <#e0c3fc><b>#<rank></b></#e0c3fc> <#8ec5ff><player></#8ec5ff> <dark_gray>»</dark_gray> <white><value></white>"
resetstats-success: "<prefix> <#a8e6cf>✔ 已彻底重置 <player> 的统计数据。</#a8e6cf>"

error-database: "<prefix> <#ff6b6b>✖ 数据库连接异常，插件已降级至安全模式运行。</#ff6b6b>"
error-invalid-theme: "<prefix> <#ff6b6b>✖ 主题配置存在语法错误，请联系管理员。</#ff6b6b>"
error-cooldown: "<prefix> <#ffd966>⏳ 你的操作太快了，请稍作休息后再试。</#ffd966>"
error-message-too-long: "<prefix> <#ff6b6b>✖ 输入的内容过长 (最多允许 <max> 个字符)。</#ff6b6b>"
error-blocked-word: "<prefix> <#ff6b6b>✖ 消息中包含违规或敏感词汇，请修改后重试。</#ff6b6b>"
error-invalid-tag: "<prefix> <#ff6b6b>✖ 消息中包含了不允许使用的颜色/格式标签。</#ff6b6b>"
error-player-not-found: "<prefix> <#ff6b6b>✖ 无法在数据库中找到该玩家的数据。</#ff6b6b>"

