# DreamKillEcho 简体中文语言文件 (美化版)
# 支持 MiniMessage。<prefix> 会自动替换为下方 prefix。

# --- [ 基础信息 ] ---
prefix: "<gradient:#74b9ff:#a29bfe><b>DreamKillEcho</b></gradient> <dark_gray>»</dark_gray>"
no-permission: "<prefix> <#ff7675>✖ 权限不足，你无法执行该操作。</#ff7675>"
reload-success: "<prefix> <#55efc4>✔ 插件配置与语言文件已成功热重载。</#55efc4>"
reload-failed: "<prefix> <#ff7675>✖ 重载失败，已保留旧配置。</#ff7675> <dark_gray>|</dark_gray> <gray>原因: <reason></gray>"
player-only: "<prefix> <#ff7675>✖ 精神实体警告：该命令只能由玩家在游戏内执行。</#ff7675>"
plugin-not-ready: "<prefix> <#fdcb6e>⏳ 插件仍在加载初始化中，请稍作等待。</#fdcb6e>"

# --- [ 帮助菜单 ] ---
help:
  - ""
  - " <#a29bfe>✦</#a29bfe> <gradient:#74b9ff:#a29bfe><b>DreamKillEcho 击杀播报指南</b></gradient> <#a29bfe>✦</#a29bfe>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke toggle</#74b9ff> <dark_gray>»</dark_gray> <gray>开启或屏蔽全局击杀播报</gray>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke theme</#74b9ff> <dark_gray>»</dark_gray> <gray>打开主题仓库 GUI，查看并切换播报主题</gray>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke set <主题></#74b9ff> <dark_gray>»</dark_gray> <gray>直接切换播报主题</gray>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke preview <主题></#74b9ff> <dark_gray>»</dark_gray> <gray>预览指定播报主题</gray>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke custom [set|preview|status]</#74b9ff> <dark_gray>»</dark_gray> <gray>定制独一无二的个人击杀语</gray>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke stats <player></#74b9ff> <dark_gray>»</dark_gray> <gray>查询个人战绩与连杀数据</gray>"
  - "  <dark_gray>▪</dark_gray> <#74b9ff>/dke top [kills|streak]</#74b9ff> <dark_gray>»</dark_gray> <gray>查看全服击杀与连杀排行榜</gray>"
  - ""

# --- [ 主题系统 ] ---
theme-list-header: "<prefix> <#a29bfe><b>可用主题图鉴：</b></#a29bfe>"
theme-list-entry: "  <dark_gray>▪</dark_gray> <white><theme></white> <gray>(<display>)</gray> <status>"
theme-owned: "<#55efc4>[✔ 已解锁]</#55efc4>"
theme-locked: "<#ff7675>[✖ 未解锁]</#ff7675>"
theme-set-success: "<prefix> <#55efc4>✔ 完美！已成功将你的主题切换至 </#55efc4><white><theme></white>"
theme-no-permission: "<prefix> <#ff7675>✖ 你尚未解锁该主题，可以通过活动或赞助获取。</#ff7675>"
theme-not-found: "<prefix> <#ff7675>✖ 找不到该主题，请检查输入名称是否正确。</#ff7675>"
theme-preview: "<prefix> <#a29bfe>✦ 效果预览:</#a29bfe> <white><message></white>"

# --- [ 自定义击杀语 ] ---
custom-set-pending: "<prefix> <#fdcb6e>⏳ 你的自定义击杀语已提交，请耐心等待管理员审核。</#fdcb6e>"
custom-set-success: "<prefix> <#55efc4>✔ 审核通过！你的自定义击杀语已生效。</#55efc4>"
custom-preview: "<prefix> <#a29bfe>✦ 模拟预览:</#a29bfe> <white><message></white>"
custom-reset: "<prefix> <#55efc4>✔ 你的自定义击杀语已重置，恢复为系统默认。</#55efc4>"
custom-denied: "<prefix> <#ff7675>✖ 抱歉，你的自定义击杀语未能通过审核，请重新修改。</#ff7675>"
custom-status: "<prefix> <gray>当前自定义内容状态: <status></gray>"

# --- [ 审核系统 (管理员) ] ---
review-empty: "<prefix> <#55efc4>✔ 太棒了，当前没有任何待审核的积压条目。</#55efc4>"
review-header: "<prefix> <#a29bfe><b>待审核的自定义击杀语列表：</b></#a29bfe>"
review-entry: "  <dark_gray>▪</dark_gray> <#74b9ff><player></#74b9ff> <dark_gray>»</dark_gray> <white><message></white>"
approve-success: "<prefix> <#55efc4>✔ 已批准 </#55efc4><#74b9ff><player></#74b9ff><#55efc4> 的自定义申请。</#55efc4>"
deny-success: "<prefix> <#ff7675>✖ 已打回 </#ff7675><#74b9ff><player></#74b9ff><#ff7675> 的自定义申请。</#ff7675>"
review-not-pending: "<prefix> <#fdcb6e>⚠ 该玩家当前没有待审核的自定义击杀语。</#fdcb6e>"

# --- [ 杂项设置 ] ---
toggle-on: "<prefix> <#55efc4>✔ 滴！已开启接收全局击杀播报。</#55efc4>"
toggle-off: "<prefix> <#fdcb6e>⚠ 嘘... 已为你屏蔽全局击杀播报。</#fdcb6e>"

# --- [ 统计数据 ] ---
stats-format: "<prefix> <#74b9ff><b><player> 的战历</b></#74b9ff> <dark_gray>| </dark_gray><gray>击杀: <#55efc4><kills></#55efc4> <dark_gray>| </dark_gray>阵亡: <#ff7675><deaths></#ff7675> <dark_gray>| </dark_gray>当前连杀: <#fdcb6e><streak></#fdcb6e> <dark_gray>| </dark_gray>最高连杀: <#a29bfe><max_streak></#a29bfe>"
top-format: "<prefix> <#a29bfe><b>#<rank></b></#a29bfe> <#74b9ff><player></#74b9ff> <dark_gray>»</dark_gray> <white><value></white>"
resetstats-success: "<prefix> <#55efc4>✔ 已将 </#55efc4><#74b9ff><player></#74b9ff><#55efc4> 的所有统计数据清零。</#55efc4>"

# --- [ 错误提示 ] ---
error-database: "<prefix> <#ff7675>✖ 数据库连接波动，插件已切换至安全模式运行。</#ff7675>"
error-invalid-theme: "<prefix> <#ff7675>✖ 主题配置文件存在语法错误，请及时联系管理员修复。</#ff7675>"
error-cooldown: "<prefix> <#fdcb6e>⏳ 你的手速太快啦，请稍作休息 (<time>秒) 后再试。</#fdcb6e>"
error-message-too-long: "<prefix> <#ff7675>✖ 灵感不错，但字数过长了 (最多允许 <max> 个字符)。</#ff7675>"
error-blocked-word: "<prefix> <#ff7675>✖ 消息中包含违规或敏感词汇，请保持优雅，修改后重试。</#ff7675>"
error-invalid-tag: "<prefix> <#ff7675>✖ 消息中包含了越权的颜色或格式标签，请去除后重试。</#ff7675>"
error-player-not-found: "<prefix> <#ff7675>✖ 翻遍了数据库，也没能找到该玩家的记录。</#ff7675>"

# --- [ 占位符默认词 ] ---
unknown-player: "某位神秘人"
unknown-weapon: "未知的神秘力量"
bare-hand: "一双铁拳"
death-cause-unknown: "不可名状的意外"

# --- [ 环境死亡播报 (已深度美化) ] ---
broadcast:
  fall: "<prefix> <#ff7675><victim></#ff7675> <gray>体验了一把没有降落伞的高空跳伞。</gray>"
  lava: "<prefix> <#ff7675><victim></#ff7675> <gray>试图在</gray> <#ff9f43>滚烫的岩浆</#ff9f43> <gray>里畅游。</gray>"
  fire: "<prefix> <#ff7675><victim></#ff7675> <gray>在烈火中化为了</gray> <#ff4757>灰烬</#ff4757><gray>。</gray>"
  drowning: "<prefix> <#ff7675><victim></#ff7675> <gray>忘记了在</gray> <#1e90ff>水下</#1e90ff> <gray>是需要呼吸的。</gray>"
  void: "<prefix> <#ff7675><victim></#ff7675> <gray>迷失在了</gray> <#2f3542>无尽的虚空</#2f3542> <gray>之中。</gray>"
  explosion: "<prefix> <#ff7675><victim></#ff7675> <gray>没能逃过那场</gray> <#ffa502>剧烈的爆炸</#ffa502><gray>。</gray>"
  cactus: "<prefix> <#ff7675><victim></#ff7675> <gray>觉得</gray> <#2ed573>仙人掌</#2ed573> <gray>毛茸茸的，于是抱了上去。</gray>"
  suffocation: "<prefix> <#ff7675><victim></#ff7675> <gray>在墙体中</gray> <dark_gray>窒息</dark_gray> <gray>而亡。</gray>"
  magic: "<prefix> <#ff7675><victim></#ff7675> <gray>被恶毒的</gray> <#9b59b6>黑魔法</#9b59b6> <gray>夺走了生命。</gray>"
  lightning: "<prefix> <#ff7675><victim></#ff7675> <gray>遭遇了</gray> <#f1c40f>天打雷劈</#f1c40f><gray>，真是不走运。</gray>"
  mob: "<prefix> <#ff7675><victim></#ff7675> <gray>在与</gray> <#ff6b81><mob></#ff6b81> <gray>的搏斗中败下阵来。</gray>"
  projectile: "<prefix> <#ff7675><victim></#ff7675> <gray>被</gray> <#ff6b81><mob></#ff6b81> <gray>在远处精准狙杀。</gray>"
  unknown: "<prefix> <#ff7675><victim></#ff7675> <gray>莫名其妙地</gray> <dark_gray>暴毙</dark_gray> <gray>了。</gray>"
