# DreamKillEcho English language file.
# MiniMessage is supported. <prefix> is replaced automatically.
prefix: "<gradient:#8ec5ff:#e0c3fc>[DreamKillEcho]</gradient>"
no-permission: "<prefix> <red>You do not have permission.</red>"
reload-success: "<prefix> <green>Configuration reloaded.</green>"
reload-failed: "<prefix> <red>Reload failed. Old configuration kept. Reason: <reason></red>"
player-only: "<prefix> <red>This command can only be used by players.</red>"
plugin-not-ready: "<prefix> <yellow>The plugin is still loading. Please try again later.</yellow>"
help:
  - "<prefix> <gray>/dke toggle</gray>"
  - "<prefix> <gray>/dke theme</gray> <dark_gray>-</dark_gray> <gray>open the theme menu</gray>"
  - "<prefix> <gray>/dke set <theme></gray>"
  - "<prefix> <gray>/dke preview <theme></gray>"
  - "<prefix> <gray>/dke custom set|preview|reset|status</gray>"
  - "<prefix> <gray>/dke stats <player> | top kills|streak</gray>"
theme-list-header: "<prefix> <aqua>Available themes:</aqua>"
theme-list-entry: "<gray>- <white><theme></white> <gray>(<display>) <status></gray>"
theme-owned: "<green>available</green>"
theme-locked: "<red>locked</red>"
theme-set-success: "<prefix> <green>Theme changed to <theme>.</green>"
theme-no-permission: "<prefix> <red>You have not unlocked this theme.</red>"
theme-not-found: "<prefix> <red>Theme not found.</red>"
theme-preview: "<prefix> <gray>Preview:</gray> <message>"
custom-set-pending: "<prefix> <yellow>Your custom kill message has been submitted for review.</yellow>"
custom-set-success: "<prefix> <green>Your custom kill message has been saved.</green>"
custom-preview: "<prefix> <gray>Preview:</gray> <message>"
custom-reset: "<prefix> <green>Your custom kill message has been reset.</green>"
custom-denied: "<prefix> <red>Your custom kill message was denied.</red>"
custom-status: "<prefix> <gray>Custom message status: <status></gray>"
review-empty: "<prefix> <green>No pending custom messages.</green>"
review-header: "<prefix> <aqua>Pending custom kill messages:</aqua>"
review-entry: "<gray>- <white><player></white>: <message></gray>"
approve-success: "<prefix> <green>Approved <player>'s custom kill message.</green>"
deny-success: "<prefix> <green>Denied <player>'s custom kill message.</green>"
review-not-pending: "<prefix> <yellow>That player does not have a pending custom kill message.</yellow>"
toggle-on: "<prefix> <green>Kill broadcasts enabled.</green>"
toggle-off: "<prefix> <yellow>Kill broadcasts disabled.</yellow>"
stats-format: "<prefix> <white><player></white> <gray>Kills <kills> / Deaths <deaths> / Streak <streak> / Best <max_streak></gray>"
top-format: "<prefix> <gray>#<rank> <white><player></white> <value></gray>"
resetstats-success: "<prefix> <green>Reset stats for <player>.</green>"
error-database: "<prefix> <red>Database is unavailable. The plugin is running in degraded mode.</red>"
error-invalid-theme: "<prefix> <red>Invalid theme configuration.</red>"
error-cooldown: "<prefix> <red>Please wait <time>s before doing that again.</red>"
error-message-too-long: "<prefix> <red>Message is too long. Max length: <max>.</red>"
error-blocked-word: "<prefix> <red>Message contains blocked content.</red>"
error-invalid-tag: "<prefix> <red>Message contains a disallowed MiniMessage tag.</red>"
error-player-not-found: "<prefix> <red>Player data not found.</red>"
unknown-player: "Unknown Player"
unknown-weapon: "Unknown Weapon"
bare-hand: "Bare Hand"
death-cause-unknown: "unknown"
broadcast:
  fall: "<prefix> <victim> fell from a high place."
  lava: "<prefix> <victim> tried to swim in lava."
  fire: "<prefix> <victim> burned to death."
  drowning: "<prefix> <victim> drowned."
  void: "<prefix> <victim> fell into the void."
  explosion: "<prefix> <victim> was blown up."
  cactus: "<prefix> <victim> was pricked to death."
  suffocation: "<prefix> <victim> suffocated."
  magic: "<prefix> <victim> was killed by magic."
  lightning: "<prefix> <victim> was struck by lightning."
  mob: "<prefix> <victim> was slain by <mob>."
  projectile: "<prefix> <victim> was shot by <mob>."
  unknown: "<prefix> <victim> died."
