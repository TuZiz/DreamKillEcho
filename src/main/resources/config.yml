# 服务器显示名，会用于 <server> 占位符。
server-name: "DreamServer"

# 语言设置：
# default 是优先使用的语言文件，对应 plugins/DreamKillEcho/lang/zh_cn.yml。
# fallback 是回退语言；default 缺少 key 时会读取 fallback。
language:
  default: "zh_cn"
  fallback: "en_us"

# 世界限制：
# mode 支持 blacklist / whitelist。
# blocked-world-* 表示命中限制世界时是否仍然允许对应行为。
worlds:
  mode: blacklist
  list:
    - spawn
    - lobby
  blocked-world-broadcast: false
  blocked-world-stats: false
  blocked-world-effects: false

# 基础播报设置。
# range-mode 支持 global / nearby / killer。
broadcast:
  enabled: true
  include-vanilla-death-message: false
  range-mode: global
  nearby-range: 64.0
  bypass-permission: "dreamkillecho.admin.bypass"

# 击杀名片设置。
# mode 支持 killer / global / nearby。
card:
  enabled: true
  mode: killer
  nearby-range: 64.0
  lines:
    - "<gradient:#8ec5ff:#e0c3fc><strikethrough>                                </strikethrough></gradient>"
    - " <dark_gray>▪</dark_gray> <gray>击杀者</gray> <dark_gray>»</dark_gray> <#a8e6cf><killer></#a8e6cf>"
    - " <dark_gray>▪</dark_gray> <gray>受害者</gray> <dark_gray>»</dark_gray> <#ff6b6b><victim></#ff6b6b>"
    - " <dark_gray>▪</dark_gray> <gray>武  器</gray> <dark_gray>»</dark_gray> <white><weapon></white>"
    - " <dark_gray>▪</dark_gray> <gray>距  离</gray> <dark_gray>»</dark_gray> <#ffd966><distance></#ffd966> <gray>格</gray>"
    - " <dark_gray>▪</dark_gray> <gray>状  态</gray> <dark_gray>»</dark_gray> <#ff6b6b><killer_health>❤</#ff6b6b> <dark_gray>|</dark_gray> <#e0c3fc><streak>连杀</#e0c3fc>"
    - "<gradient:#e0c3fc:#8ec5ff><strikethrough>                                </strikethrough></gradient>"

# 击杀展示特效，只做视觉与声音展示，不提供任何战斗收益。
# global-limit-per-minute 是全局特效限流，避免粒子、烟花刷屏。
effects:
  enabled: true
  global-limit-per-minute: 30
  title:
    enabled: true
    title: "<gradient:#ff6b6b:#ff8e8b><b>击 杀</b></gradient>"
    subtitle: "<#a8e6cf><killer></#a8e6cf> <gray>终结了</gray> <#ff6b6b><victim></#ff6b6b>"
  actionbar:
    enabled: true
    message: "<#ffd966>⚡ 当前连杀: <b><streak></b></#ffd966>"
  sound:
    enabled: true
    name: "entity.player.levelup"
    volume: 0.7
    pitch: 1.2
  particle:
    enabled: true
    name: "FIREWORK"
    count: 16
    max-count: 32
  firework:
    enabled: false
    max-per-kill: 1
  bossbar:
    enabled: false
    seconds: 5
    message: "<#8ec5ff><killer></#8ec5ff> <gray>⚔</gray> <#ff6b6b><victim></#ff6b6b>"

# 自定义击杀语安全设置。
# denied-tags 默认拦截 click、hover、selector、nbt 等不适合玩家自由输入的 MiniMessage 标签。
custom-message:
  max-length: 80
  cooldown-seconds: 60
  require-review: true
  use-as-theme-message: false
  blocked-words:
    - "blocked-word"
  denied-tags:
    - click
    - hover
    - insertion
    - selector
    - score
    - nbt
    - keybind
    - translatable

# 连杀播报配置。只播报展示，不发放奖励。
streaks:
  enabled: true
  messages:
    3: "<#ffd966><b>[连杀]</b> <killer> 势不可挡，达成了 3 连杀！</#ffd966>"
    5: "<#ff8e8b><b>[暴走]</b> <killer> 已经主宰战场，达成 5 连杀！</#ff8e8b>"
    8: "<#ff6b6b><b>[超神]</b> 谁能赐死？！<killer> 达成 8 连杀！</#ff6b6b>"
    10: "<gradient:#ff0066:#ffcc00><b>[传说]</b> 宛如神明降临！<killer> 达成 10 连杀！</gradient>"
  shutdown-message: "<#8ec5ff><b>[终结]</b> <killer> 终结了 <victim> 的 <streak> 连杀！</#8ec5ff>"
  revenge-message: "<#e0c3fc><b>[复仇]</b> 宿命的对决！<killer> 成功对 <victim> 完成了复仇！</#e0c3fc>"

# 防刷屏规则，只影响播报与展示，不影响正常击杀事件。
anti-spam:
  same-killer-cooldown-seconds: 2
  same-victim-cooldown-seconds: 2
  max-broadcast-per-minute: 60
  max-effect-per-minute: 30
  per-player-message-cooldown: 1

# 防刷击杀规则，只影响统计与播报，不阻止玩家正常 PVP。
anti-farm:
  enabled: true
  same-victim-no-stats-seconds: 60
  same-ip-no-stats: false
  max-same-victim-count-per-day: 5
  # 同一击杀者/受害者 pair 的反刷记录保留时间，超时后惰性清理，避免长期运行内存增长。
  same-victim-record-ttl-seconds: 600
  # 复仇判定时间窗。超过该时间的反向击杀不再触发复仇播报。
  revenge-window-seconds: 600

# 缓存写回数据库的周期。数据库写入会走异步存储线程。
storage:
  flush-interval-seconds: 120
