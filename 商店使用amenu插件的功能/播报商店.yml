Title: "<gradient:#A18CD1:#FBC2EB><bold>击杀播报商店</bold></gradient>"

Shape:
  - "BBBBBBBBB"
  - "B`自定义播报`B`VIP播报`B`VIP+播报`B"
  - "B`MVP播报`B`MVP+播报`B`SVIP播报`B"
  - "B`甜蜜播报`B`击杀名片`B`打开仓库`B"
  - "BBBBBBBBB"
  - "BB`返回点券商店`B`返回主菜单`BB"

Fill:
  material: BLACK_STAINED_GLASS_PANE
  name: " "

buttons:
  "B":
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  "自定义播报":
    material: WRITABLE_BOOK
    glow: true
    name: "<gradient:#A18CD1:#FBC2EB><bold>✦ 自定义击杀播报 ✦</bold></gradient>"
    lore:
      - ""
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>解锁 /dke custom set，自定义你的击杀播报文案</#E0E0E0>"
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>提交后按插件配置进入审核或直接生效</#E0E0E0>"
      - ""
      - " <#F6D365>❖</#F6D365> <#CCCCCC>价格:</#CCCCCC> <color:#FFD700>280 星辰</color>"
      - " <#F6D365>❖</#F6D365> <#CCCCCC>当前星辰:</#CCCCCC> <color:#00FF7F>%playerpoints_points%</color>"
      - ""
      - " <#A18CD1>➭</#A18CD1> <#FBC2EB>左键点击购买</#FBC2EB>"
    click:
      - condition: "check papi *%playerpoints_points% >= *280"
        actions:
          - "take-point: 280"
          - "console: lp user %player_name% permission set dreamkillecho.custom.message true"
          - "sound: ENTITY_PLAYER_LEVELUP:1:1.4"
          - "title: &d&l自定义播报已解锁||&7使用 /dke custom set <内容>"
          - "tell: &8[&d播报商店&8] &a你已解锁自定义击杀播报，可使用 &f/dke custom set <内容>&a。"
          - "close"
        deny:
          - "sound: BLOCK_ANVIL_DESTROY:1:2"
          - "title: &c&l购买失败||&7星辰不足"
          - "tell: &8[&c提示&8] &c需要 &e280 星辰&c，当前: &f%playerpoints_points%"
    icons:
      - condition: "perm *dreamkillecho.custom.message"
        material: WRITABLE_BOOK
        glow: true
        name: "<gradient:#43E97B:#38F9D7><bold>✦ 自定义击杀播报 | 已解锁 ✦</bold></gradient>"
        lore:
          - ""
          - " <#43E97B>✔</#43E97B> <#38F9D7>你已拥有自定义击杀播报权限</#38F9D7>"
          - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>使用 /dke custom set <内容> 设置文案</#E0E0E0>"
        click:
          - "close"
          - "delay: 1"
          - "player: dke custom status"

