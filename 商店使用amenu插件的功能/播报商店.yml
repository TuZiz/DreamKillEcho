Title: "<gradient:#A18CD1:#FBC2EB><bold>击杀播报商店</bold></gradient>"

Shape:
  - "BBBBBBBBB"
  - "B`烈焰播报`B`破军播报`B`心动播报`B"
  - "B`星河播报`B`霜雷播报`B`审判播报`B"
  - "BBBB`打开仓库`BBBB"
  - "BBBBBBBBB"
  - "BB`返回点券商店`B`返回主菜单`BB"

Fill:
  material: BLACK_STAINED_GLASS_PANE
  name: " "

buttons:
  "B":
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  "烈焰播报":
    material: BLAZE_POWDER
    glow: true
    name: "<gradient:#ffd166:#ff7b00><bold>✦ 烈焰播报主题 ✦</bold></gradient>"
    lore:
      - ""
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>主题 ID:</#E0E0E0> <#ffd166>blaze</#ffd166>"
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>主题稀有度:</#E0E0E0> <#ff9f1c>稀有</#ff9f1c>"
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>解锁后可在 /dke theme 中切换</#E0E0E0>"
      - ""
      - " <#38F9D7>播报示例:</#38F9D7>"
      - " <gradient:#ffd166:#ff7b00><bold>✦ 烈焰</bold></gradient> <#ffd166>PlayerA</#ffd166> <gray>挥舞</gray> <white>钻石剑</white> <#ff9f1c>焚尽了</#ff9f1c> <#ff6b6b>PlayerB</#ff6b6b>"
      - ""
      - " <#F6D365>❖</#F6D365> <#CCCCCC>价格:</#CCCCCC> <color:#FFD700>280 星辰</color>"
      - " <#F6D365>❖</#F6D365> <#CCCCCC>当前星辰:</#CCCCCC> <color:#00FF7F>%playerpoints_points%</color>"
      - ""
      - " <#ff9f1c>➭</#ff9f1c> <#ffd166>左键点击购买</#ffd166>"
    click:
      - condition: "check papi *%playerpoints_points% >= *280"
        actions:
          - "take-point: 280"
          - "console: lp user %player_name% permission set dreamkillecho.blaze true"
          - "sound: ENTITY_PLAYER_LEVELUP:1:1.4"
          - "title: &6&l烈焰播报已解锁||&7使用 /dke theme 切换"
          - "tell: &8[&d播报商店&8] &a你已解锁 &6烈焰&a 播报主题。"
          - "close"
        deny:
          - "sound: BLOCK_ANVIL_DESTROY:1:2"
          - "title: &c&l购买失败||&7星辰不足"
          - "tell: &8[&c提示&8] &c需要 &e280 星辰&c，当前: &f%playerpoints_points%"
    icons:
      - condition: "perm *dreamkillecho.blaze"
        material: BLAZE_POWDER
        glow: true
        name: "<gradient:#43E97B:#38F9D7><bold>✦ 烈焰播报 | 已解锁 ✦</bold></gradient>"
        lore:
          - ""
          - " <#43E97B>✔</#43E97B> <#38F9D7>你已拥有烈焰播报主题</#38F9D7>"
          - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>点击切换到 blaze</#E0E0E0>"
        click:
          - "close"
          - "delay: 1"
          - "player: dke set blaze"

